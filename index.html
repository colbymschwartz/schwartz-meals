                            {currentView === "family" && (
                                <div className="view active">
                                    <div style={{ padding: "12px" }}>
                                        <div className="card">
                                            <div style={{ fontSize: "16px", fontWeight: "700", marginBottom: "16px" }}>Family Settings</div>

                                            <div style={{ marginBottom: "20px" }}>
                                                <div style={{ fontSize: "13px", fontWeight: "700", color: "var(--primary)", marginBottom: "12px" }}>
                                                    Visiting Status
                                                </div>
                                                {FAMILY_MEMBERS.map(member => {
                                                    if (member.visiting === undefined) return null;
                                                    const isVisiting = familySettings[member.id]?.visiting || false;
                                                    return (
                                                        <div key={member.id} className="setting-item">
                                                            <span className="setting-label">{member.name}</span>
                                                            <label className="toggle-switch">
                                                                <input
                                                                    type="checkbox"
                                                                    checked={isVisiting}
                                                                    onChange={(e) => {
                                                                        setFamilySettings({
                                                                            ...familySettings,
                                                                            [member.id]: { ...familySettings[member.id], visiting: e.target.checked }
                                                                        });
                                                                    }}
                                                                />
                                                                <span className="toggle-slider"></span>
                                                            </label>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            <div style={{ fontSize: "13px", fontWeight: "700", color: "var(--primary)", marginBottom: "12px" }}>
                                                Recipe Search Settings
                                            </div>
                                            <div style={{ fontSize: "12px", color: "var(--text-light)", padding: "12px", background: "var(--cream)", borderRadius: "8px", marginBottom: "12px" }}>
                                                TheMealDB is always on (free, ~300 recipes). For 5,000+ recipes with detailed ingredients, add a free Spoonacular API key below.
                                            </div>
                                            <div className="form-group" style={{ marginBottom: "12px" }}>
                                                <label style={{ fontSize: "13px" }}>Spoonacular API Key (optional)</label>
                                                <input
                                                    type="text"
                                                    placeholder="Paste your free API key from spoonacular.com/food-api"
                                                    value={settings.spoonacularKey || ""}
                                                    onChange={(e) => {
                                                        setSettings({ ...settings, spoonacularKey: e.target.value });
                                                    }}
                                                    style={{ fontSize: "13px" }}
                                                />
                                            </div>
                                            <div style={{ fontSize: "11px", color: "var(--text-light)", padding: "8px 12px" }}>
                                                Free tier: 150 searches/day. Sign up at spoonacular.com/food-api
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <nav className="bottom-nav">
                        <button className={`nav-item ${currentView === "planner" ? "active" : ""}`} onClick={() => setCurrentView("planner")}>
                            <div className="nav-icon">📅</div>
                            <div className="nav-label">Planner</div>
                        </button>
                        <button className={`nav-item ${currentView === "recipes" ? "active" : ""}`} onClick={() => setCurrentView("recipes")}>
                            <div className="nav-icon">🔍</div>
                            <div className="nav-label">Recipes</div>
                        </button>
                        <button className={`nav-item ${currentView === "shopping" ? "active" : ""}`} onClick={() => setCurrentView("shopping")}>
                            <div className="nav-icon">🛒</div>
                            <div className="nav-label">Shopping</div>
                        </button>
                        <button className={`nav-item ${currentView === "family" ? "active" : ""}`} onClick={() => setCurrentView("family")}>
                            <div className="nav-icon">👨‍👩‍👧‍👦</div>
                            <div className="nav-label">Family</div>
                        </button>
                    </nav>

                    {showRecipeSearchModal && (
                        <RecipeSearchModal onClose={() => setShowRecipeSearchModal(false)} meals={meals} selectedSlot={selectedSlot} onSelectMeal={handleSelectMeal} setMeals={setMeals} onAddCustom={(prefill) => {
                            setShowRecipeSearchModal(false);
                            setAddMealInitialName(prefill || "");
                            setShowAddMealModal(true);
                        }} />
                    )}

                    {showMealPickerModal && (
                        <MealPickerModal meals={meals} onSelectMeal={handleSelectMeal} onClose={() => setShowMealPickerModal(false)} slot={selectedSlot} isFavorite={isFavorite} />
                    )}

                    {showAddMealModal && (
                        <AddMealModal onClose={() => { setShowAddMealModal(false); setAddMealInitialName(""); }} onSave={handleAddMeal} initialName={addMealInitialName} />
                    )}

                    {selectedMeal && (
                        <MealDetailModal meal={selectedMeal} onClose={() => setSelectedMeal(null)} familyMembers={familyMembers} onRate={(memberId, rating) => {
                            const updatedMeals = meals.map(m => {
                                if (m.id === selectedMeal.id) {
                                    const newRatings = { ...m.ratings, [memberId]: rating };
                                    const newRating = Object.values(newRatings).reduce((a, b) => a + b, 0) / Object.values(newRatings).length;
                                    return { ...m, ratings: newRatings, rating: newRating };
                                }
                                return m;
                            });
                            setMeals(updatedMeals);
                            setSelectedMeal({ ...selectedMeal, ratings: updatedMeals.find(m => m.id === selectedMeal.id).ratings, rating: updatedMeals.find(m => m.id === selectedMeal.id).rating });
                        }} />
                    )}

                    {showQuickFillModal && (
                        <QuickFillModal onClose={() => setShowQuickFillModal(false)} weekPlan={weekPlan} setWeekPlan={setWeekPlan} meals={meals} getWeekDates={() => getWeekDatesForOffset(weekOffset)} />
                    )}

                    {showVotingModal && (
                        <VotingModal onClose={() => setShowVotingModal(false)} votingStep={votingStep} setVotingStep={setVotingStep} selectedCandidates={selectedCandidates} setSelectedCandidates={setSelectedCandidates} familyVotes={familyVotes} setFamilyVotes={setFamilyVotes} voteCandidates={voteCandidates} setVoteCandidates={setVoteCandidates} meals={meals} familyMembers={familyMembers} weekPlan={weekPlan} setWeekPlan={setWeekPlan} getWeekDates={() => getWeekDatesForOffset(weekOffset)} setCurrentView={setCurrentView} />
                    )}
                </div>
            );
        }

        function RecipeSearchModal({ onClose, meals, selectedSlot, onSelectMeal, setMeals, onAddCustom }) {
            const [searchQuery, setSearchQuery] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [onlineResults, setOnlineResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [expandedResult, setExpandedResult] = useState(null);
            const [searchStatus, setSearchStatus] = useState("");
            const searchTimer = useRef(null);
            const settings = storage.getSettings();

            const parseMealDBFull = (dbMeal) => {
                const ingredients = [];
                for (let i = 1; i <= 20; i++) {
                    const ingredient = dbMeal[`strIngredient${i}`];
                    const measure = dbMeal[`strMeasure${i}`];
                    if (ingredient && ingredient.trim()) {
                        const qty = measure && measure.trim() ? `${measure.trim()} ${ingredient.trim()}` : ingredient.trim();
                        ingredients.push(qty);
                    }
                }
                return {
                    id: `mealdb-${dbMeal.idMeal}`,
                    name: dbMeal.strMeal,
                    cuisine: dbMeal.strArea || "International",
                    prepTime: 30,
                    ingredients: ingredients,
                    steps: dbMeal.strInstructions
                        ? dbMeal.strInstructions.split(/\r?\n/).filter(s => s.trim().length > 3).slice(0, 10)
                        : [],
                    recipeUrl: dbMeal.strSource || "",
                    imageUrl: dbMeal.strMealThumb || "",
                    notes: dbMeal.strCategory || "",
                    rating: 0,
                    ratings: {},
                    source: "TheMealDB"
                };
            };

            const parseSpoonacularRecipe = (recipe) => {
                return {
                    id: `spoon-${recipe.id}`,
                    name: recipe.title,
                    cuisine: (recipe.cuisines && recipe.cuisines[0]) || "International",
                    prepTime: recipe.readyInMinutes || 30,
                    ingredients: recipe.extendedIngredients
                        ? recipe.extendedIngredients.map(ing => ing.original || `${ing.amount} ${ing.unit} ${ing.name}`)
                        : [],
                    steps: recipe.analyzedInstructions && recipe.analyzedInstructions[0]
                        ? recipe.analyzedInstructions[0].steps.map(s => s.step)
                        : [],
                    recipeUrl: recipe.sourceUrl || "",
                    imageUrl: recipe.image || "",
                    notes: recipe.summary ? recipe.summary.replace(/<[^>]*>/g, "").substring(0, 100) : "",
                    rating: 0,
                    ratings: {},
                    source: "Spoonacular"
                };
            };

            // Fetch full meal details from TheMealDB by ID
            const fetchMealDBDetails = async (mealId) => {
                try {
                    const resp = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${mealId}`);
                    const data = await resp.json();
                    if (data.meals && data.meals[0]) {
                        return parseMealDBFull(data.meals[0]);
                    }
                } catch (err) { /* silently fail */ }
                return null;
            };

            const handleSearch = (query) => {
                setSearchQuery(query);
                if (searchTimer.current) clearTimeout(searchTimer.current);

                if (!query.trim()) {
                    setSearchResults([]);
                    setOnlineResults([]);
                    setIsSearching(false);
                    setExpandedResult(null);
                    setSearchStatus("");
                    return;
                }

                // Instant local results
                const localResults = fuzzySearch(query, meals, "name");
                setSearchResults(localResults.slice(0, 5));

                // Debounced API search (500ms)
                setIsSearching(true);
                setSearchStatus("Searching online...");
                searchTimer.current = setTimeout(async () => {
                    const seenIds = new Set();
                    const apiResults = [];

                    // --- TheMealDB: 3 search strategies ---

                    // Strategy 1: Name search (finds "French Toast", "Chicken Alfredo", etc.)
                    try {
                        setSearchStatus("Searching by name...");
                        const resp = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`);
                        const data = await resp.json();
                        if (data.meals) {
                            data.meals.forEach(m => {
                                if (!seenIds.has(m.idMeal)) {
                                    seenIds.add(m.idMeal);
                                    apiResults.push(parseMealDBFull(m));
                                }
                            });
                        }
                    } catch (err) { /* silently fail */ }

                    // Strategy 2: Ingredient filter (finds ALL recipes using that ingredient)
                    // Try each word in the query as a potential ingredient
                    const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
                    for (const word of words) {
                        try {
                            setSearchStatus(`Searching by ingredient: ${word}...`);
                            const resp = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(word)}`);
                            const data = await resp.json();
                            if (data.meals) {
                                // Filter endpoint only returns id/name/image, need to fetch full details
                                const newMeals = data.meals.filter(m => !seenIds.has(m.idMeal)).slice(0, 8);
                                setSearchStatus(`Found ${data.meals.length} ${word} recipes, loading details...`);
                                for (const stub of newMeals) {
                                    if (seenIds.has(stub.idMeal)) continue;
                                    seenIds.add(stub.idMeal);
                                    const full = await fetchMealDBDetails(stub.idMeal);
                                    if (full) apiResults.push(full);
                                }
                            }
                        } catch (err) { /* ingredient not found, skip */ }
                    }

                    // Strategy 3: First letter search as fallback if nothing found
                    if (apiResults.length < 3 && query.length >= 1) {
                        try {
                            const resp = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?f=${query[0]}`);
                            const data = await resp.json();
                            if (data.meals) {
                                const lowerQuery = query.toLowerCase();
                                data.meals
                                    .filter(m => m.strMeal.toLowerCase().includes(lowerQuery) || lowerQuery.split(/\s+/).some(w => m.strMeal.toLowerCase().includes(w)))
                                    .slice(0, 5)
                                    .forEach(m => {
                                        if (!seenIds.has(m.idMeal)) {
                                            seenIds.add(m.idMeal);
                                            apiResults.push(parseMealDBFull(m));
                                        }
                                    });
                            }
                        } catch (err) { /* silently fail */ }
                    }

                    // --- Spoonacular (if key provided) ---
                    if (settings.spoonacularKey) {
                        try {
                            setSearchStatus("Searching Spoonacular...");
                            const resp = await fetch(`https://api.spoonacular.com/recipes/complexSearch?query=${encodeURIComponent(query)}&addRecipeInformation=true&fillIngredients=true&number=5&apiKey=${settings.spoonacularKey}`);
                            const data = await resp.json();
                            if (data.results) {
                                data.results.forEach(r => {
                                    apiResults.push(parseSpoonacularRecipe(r));
                                });
                            }
                        } catch (err) { /* silently fail */ }
                    }

                    // Dedupe by name (case-insensitive)
                    const seenNames = new Set(meals.map(m => m.name.toLowerCase()));
                    const unique = apiResults.filter(r => {
                        const lower = r.name.toLowerCase();
                        if (seenNames.has(lower)) return false;
                        seenNames.add(lower);
                        return true;
                    });

                    setOnlineResults(unique);
                    setIsSearching(false);
                    setSearchStatus(unique.length > 0 ? `${unique.length} online recipes found` : "");
                }, 500);
            };

            const addOnlineRecipeAndSelect = (recipe) => {
                const currentMeals = storage.getMeals();
                const existing = currentMeals.find(m => m.id === recipe.id);
                if (!existing) {
                    currentMeals.push(recipe);
                    storage.saveMeals(currentMeals);
                    setMeals(currentMeals);
                }
                onSelectMeal(recipe.id);
            };

            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content" style={{ maxHeight: "90vh" }}>
                        <div className="modal-header">
                            <div>Find a Recipe</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        <div style={{ padding: "0 20px 20px" }}>
                            <input
                                type="text"
                                className="search-input"
                                placeholder="What are you in the mood for? (e.g. chicken, french toast, salmon...)"
                                value={searchQuery}
                                onChange={(e) => handleSearch(e.target.value)}
                                autoFocus
                                style={{ fontSize: "16px", padding: "14px" }}
                            />

                            {!searchQuery && (
                                <div style={{ padding: "12px 0" }}>
                                    <div style={{ fontSize: "13px", color: "var(--text-light)", marginBottom: "10px" }}>Quick ideas:</div>
                                    <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                                        {["Chicken", "Beef", "Salmon", "Pasta", "Pork", "Lamb", "Shrimp", "Vegetarian"].map(chip => (
                                            <button key={chip} className="chip" onClick={() => handleSearch(chip)} style={{ cursor: "pointer" }}>{chip}</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {searchResults.length > 0 && (
                                <>
                                    <div style={{ fontSize: "13px", fontWeight: "700", color: "var(--accent)", marginTop: "12px", marginBottom: "8px" }}>
                                        Your Library ({searchResults.length})
                                    </div>
                                    {searchResults.map(meal => (
                                        <div key={meal.id} className="search-result-item" onClick={() => onSelectMeal(meal.id)}>
                                            <div className="search-result-icon">{MEAL_ICONS[meal.cuisine] || "🍽"}</div>
                                            <div className="search-result-text">
                                                <div className="search-result-name">{meal.name}</div>
                                                <div className="search-result-meta">
                                                    {meal.cuisine} • {meal.prepTime}m
                                                    {meal.ingredients ? ` • ${meal.ingredients.length} ingredients` : ""}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </>
                            )}

                            {isSearching && (
                                <div style={{ textAlign: "center", padding: "16px", color: "var(--text-light)", fontSize: "14px" }}>
                                    <div style={{ marginBottom: "4px" }}>{searchStatus || "Searching online recipes..."}</div>
                                    <div style={{ fontSize: "20px", animation: "fadeIn 0.5s ease infinite alternate" }}>🔍</div>
                                </div>
                            )}

                            {!isSearching && onlineResults.length > 0 && (
                                <>
                                    <div style={{ fontSize: "13px", fontWeight: "700", color: "var(--primary)", marginTop: "16px", marginBottom: "4px" }}>
                                        Online Recipes ({onlineResults.length} found)
                                    </div>
                                    <div style={{ fontSize: "11px", color: "var(--text-light)", marginBottom: "8px" }}>
                                        Tap to preview ingredients. Hit "Use This Recipe" to add to your plan.
                                    </div>
                                    {onlineResults.map(recipe => (
                                        <div key={recipe.id}>
                                            <div className="search-result-item" onClick={() => setExpandedResult(expandedResult === recipe.id ? null : recipe.id)}>
                                                <div className="search-result-icon">🌐</div>
                                                <div className="search-result-text" style={{ flex: 1 }}>
                                                    <div className="search-result-name">{recipe.name}</div>
                                                    <div className="search-result-meta">
                                                        {recipe.cuisine} • {recipe.prepTime}m • {recipe.ingredients.length} ingredients
                                                    </div>
                                                </div>
                                                <div style={{ fontSize: "14px", color: "var(--text-light)", transform: expandedResult === recipe.id ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</div>
                                            </div>

                                            {expandedResult === recipe.id && (
                                                <div style={{ background: "var(--cream)", borderRadius: "8px", padding: "16px", margin: "0 0 8px 0", border: "1px solid var(--border-light)" }}>
                                                    {recipe.ingredients.length > 0 && (
                                                        <>
                                                            <div style={{ fontWeight: "700", fontSize: "13px", marginBottom: "8px", color: "var(--text-dark)" }}>Ingredients ({recipe.ingredients.length}):</div>
                                                            <ul style={{ fontSize: "13px", color: "var(--text-light)", paddingLeft: "20px", marginBottom: "12px", lineHeight: "1.6" }}>
                                                                {recipe.ingredients.map((ing, idx) => (
                                                                    <li key={idx}>{ing}</li>
                                                                ))}
                                                            </ul>
                                                        </>
                                                    )}
                                                    {recipe.steps.length > 0 && (
                                                        <>
                                                            <div style={{ fontWeight: "700", fontSize: "13px", marginBottom: "8px", color: "var(--text-dark)" }}>Directions:</div>
                                                            <ol style={{ fontSize: "13px", color: "var(--text-light)", paddingLeft: "20px", marginBottom: "12px", lineHeight: "1.6" }}>
                                                                {recipe.steps.slice(0, 8).map((step, idx) => (
                                                                    <li key={idx} style={{ marginBottom: "4px" }}>{step}</li>
                                                                ))}
                                                                {recipe.steps.length > 8 && <li style={{ fontStyle: "italic" }}>...{recipe.steps.length - 8} more steps</li>}
                                                            </ol>
                                                        </>
                                                    )}
                                                    {recipe.recipeUrl && (
                                                        <div style={{ fontSize: "12px", marginBottom: "12px" }}>
                                                            <a href={recipe.recipeUrl} target="_blank" rel="noopener" style={{ color: "var(--primary)" }}>View original recipe ↗</a>
                                                        </div>
                                                    )}
                                                    <button
                                                        className="btn btn-primary"
                                                        style={{ width: "100%" }}
                                                        onClick={() => addOnlineRecipeAndSelect(recipe)}
                                                    >
                                                        Use This Recipe + Add to Shopping List
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </>
                            )}

                            {searchQuery && !isSearching && searchResults.length === 0 && onlineResults.length === 0 && (
                                <div style={{ textAlign: "center", padding: "20px 0", color: "var(--text-light)" }}>
                                    <div style={{ fontSize: "40px", marginBottom: "8px" }}>🤷</div>
                                    <div style={{ marginBottom: "4px", fontWeight: "600", color: "var(--text-dark)" }}>No matches found</div>
                                    <div style={{ fontSize: "13px", marginBottom: "16px" }}>Try a simpler keyword (like "chicken" instead of "chicken garlic sauce"), or add it yourself</div>
                                </div>
                            )}

                            <div style={{ borderTop: "1px solid var(--border-light)", paddingTop: "16px", marginTop: "16px" }}>
                                <button
                                    className="btn btn-primary"
                                    style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: "8px" }}
                                    onClick={() => onAddCustom(searchQuery)}
                                >
                                    + Add Custom Meal {searchQuery ? `"${searchQuery}"` : ""}
                                </button>
                                {!settings.spoonacularKey && (
                                    <div style={{ fontSize: "11px", color: "var(--text-light)", textAlign: "center", marginTop: "8px" }}>
                                        Want 5,000+ recipes? Add a free Spoonacular API key in Family settings
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function MealDetailModal({ meal, onClose, familyMembers, onRate }) {
            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content">
                        <div className="modal-header">
                            <div>{meal.name}</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        <div style={{ paddingBottom: "20px" }}>
                            <div className="hero-card" style={{ margin: "12px" }}>
                                <div style={{ fontSize: "48px", marginBottom: "12px" }}>{MEAL_ICONS[meal.cuisine]}</div>
                                <h2 style={{ fontSize: "24px", fontWeight: "700", marginBottom: "8px" }}>{meal.name}</h2>
                                <span className="cuisine-tag">{meal.cuisine}</span>
                                <div style={{ marginTop: "12px", fontSize: "14px" }}>⏱ {meal.prepTime} minutes</div>
                            </div>

                            {meal.steps && meal.steps.length > 0 && (
                                <div className="detail-section">
                                    <div className="detail-section-title">Cooking Steps</div>
                                    {meal.steps.map((step, idx) => (
                                        <div key={idx} className="cooking-step">
                                            <span className="cooking-step-number">{idx + 1}</span>
                                            {step}
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="detail-section">
                                <div className="detail-section-title">Ingredients</div>
                                {meal.ingredients && meal.ingredients.map((ingredient, idx) => (
                                    <div key={idx} className="ingredient-item">
                                        {ingredient}
                                    </div>
                                ))}
                            </div>

                            {meal.notes && (
                                <div className="detail-section">
                                    <div className="detail-section-title">Notes</div>
                                    <div style={{ padding: "12px", background: "var(--cream)", borderRadius: "8px", fontSize: "13px" }}>
                                        {meal.notes}
                                    </div>
                                </div>
                            )}

                            <div className="detail-section">
                                <div className="detail-section-title">Family Ratings</div>
                                <div className="ratings-grid">
                                    {familyMembers.map(member => {
                                        const memberRating = meal.ratings?.[member.id] || 0;
                                        return (
                                            <div key={member.id} className="rating-item">
                                                <div className="rating-member">{member.name}</div>
                                                <div className="rating-stars">
                                                    {[1, 2, 3, 4, 5].map(star => (
                                                        <button key={star} className="star" onClick={() => onRate(member.id, star)}>
                                                            {star <= memberRating ? "⭐" : "☆"}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="detail-section">
                                <div style={{ fontSize: "14px", fontWeight: "600", color: "var(--primary)" }}>
                                    Average Rating: {"⭐".repeat(Math.round(meal.rating || 0))} {meal.rating?.toFixed(1) || "No ratings"}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function QuickFillModal({ onClose, weekPlan, setWeekPlan, meals, getWeekDates }) {
            const [preview, setPreview] = useState([]);

            useEffect(() => {
                generatePreview();
            }, []);

            const generatePreview = () => {
                const emptySlots = [];
                getWeekDates().forEach(date => {
                    ["breakfast", "lunch", "dinner"].forEach(type => {
                        if (!weekPlan[`${date}-${type}`]) {
                            emptySlots.push({ date, type, key: `${date}-${type}` });
                        }
                    });
                });

                if (emptySlots.length === 0) {
                    setPreview([]);
                    return;
                }

                // Sort meals by rating
                const sortedMeals = [...meals].sort((a, b) => (b.rating || 0) - (a.rating || 0));
                const assigned = [];
                const usedMeals = new Set();
                const cuisineCounts = {};

                emptySlots.forEach(slot => {
                    for (let meal of sortedMeals) {
                        const cuisineCount = cuisineCounts[meal.cuisine] || 0;
                        if (!usedMeals.has(meal.id) && cuisineCount < 2) {
                            assigned.push({ slot: slot.key, meal: meal.name, mealId: meal.id });
                            usedMeals.add(meal.id);
                            cuisineCounts[meal.cuisine] = cuisineCount + 1;
                            break;
                        }
                    }
                });

                setPreview(assigned);
            };

            const handleShuffle = () => {
                generatePreview();
            };

            const handleFillItUp = () => {
                const newPlan = { ...weekPlan };
                preview.forEach(item => {
                    newPlan[item.slot] = item.mealId;
                });
                setWeekPlan(newPlan);
                onClose();
            };

            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content">
                        <div className="modal-header">
                            <div>Auto-fill empty slots with top-rated meals?</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>
                        <div style={{ padding: "20px" }}>
                            {preview.length === 0 ? (
                                <div className="empty-state" style={{ padding: "40px 20px" }}>
                                    <div className="empty-state-icon">✓</div>
                                    <div className="empty-state-text">All slots are already filled!</div>
                                </div>
                            ) : (
                                <>
                                    <div style={{ marginBottom: "16px" }}>
                                        {preview.map((item, idx) => (
                                            <div key={idx} className="quick-fill-preview">
                                                <div>{item.meal}</div>
                                                <div style={{ fontSize: "12px", color: "var(--text-light)" }}>{item.slot}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ display: "flex", gap: "12px" }}>
                                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={handleFillItUp}>
                                            Fill It Up
                                        </button>
                                        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={handleShuffle}>
                                            🔀 Shuffle
                                        </button>
                                        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={onClose}>
                                            Cancel
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function VotingModal({ onClose, votingStep, setVotingStep, selectedCandidates, setSelectedCandidates, familyVotes, setFamilyVotes, voteCandidates, setVoteCandidates, meals, familyMembers, weekPlan, setWeekPlan, getWeekDates, setCurrentView }) {
            const [searchQuery, setSearchQuery] = useState("");

            const handleSelectCandidate = (mealId) => {
                if (selectedCandidates.includes(mealId)) {
                    setSelectedCandidates(selectedCandidates.filter(id => id !== mealId));
                } else if (selectedCandidates.length < 8) {
                    setSelectedCandidates([...selectedCandidates, mealId]);
                }
            };

            const handleGoToSend = () => {
                setVoteCandidates(selectedCandidates.map(id => meals.find(m => m.id === id)).filter(m => m));
                setVotingStep("send");
            };

            const handleGoToTally = () => {
                setVotingStep("tally");
                familyMembers.forEach(member => {
                    if (!familyVotes[member.id]) {
                        setFamilyVotes(prev => ({ ...prev, [member.id]: [] }));
                    }
                });
            };

            const handleVoteMeal = (memberId, mealId) => {
                const memberVotes = familyVotes[memberId] || [];
                if (memberVotes.includes(mealId)) {
                    setFamilyVotes(prev => ({ ...prev, [memberId]: memberVotes.filter(id => id !== mealId) }));
                } else if (memberVotes.length < 3) {
                    setFamilyVotes(prev => ({ ...prev, [memberId]: [...memberVotes, mealId] }));
                }
            };

            const getVoteTally = () => {
                const tally = {};
                Object.values(familyVotes).forEach(votes => {
                    votes.forEach((mealId, idx) => {
                        const points = 3 - idx; // 1st choice = 3 pts, 2nd = 2 pts, 3rd = 1 pt
                        tally[mealId] = (tally[mealId] || 0) + points;
                    });
                });
                return Object.entries(tally)
                    .map(([mealId, points]) => ({ mealId, points, meal: voteCandidates.find(m => m.id === mealId) }))
                    .filter(t => t.meal)
                    .sort((a, b) => b.points - a.points);
            };

            const handlePlanWinners = () => {
                const tally = getVoteTally().slice(0, 3);
                const emptySlots = [];
                getWeekDates().forEach(date => {
                    ["breakfast", "lunch", "dinner"].forEach(type => {
                        if (!weekPlan[`${date}-${type}`]) {
                            emptySlots.push(`${date}-${type}`);
                        }
                    });
                });

                const newPlan = { ...weekPlan };
                tally.forEach((item, idx) => {
                    if (idx < emptySlots.length) {
                        newPlan[emptySlots[idx]] = item.mealId;
                    }
                });
                setWeekPlan(newPlan);
                onClose();
                setCurrentView("planner");
            };

            const filteredMeals = searchQuery ? meals.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase())).slice(0, 10) : meals.slice(0, 8);
            const tally = getVoteTally();
            const maxVotes = tally.length > 0 ? tally[0].points : 1;

            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content" style={{ maxHeight: "85vh", overflowY: "auto" }}>
                        <div className="modal-header">
                            <div>
                                {votingStep === "candidates" && "Pick Candidates (4-8)"}
                                {votingStep === "send" && "Send Poll"}
                                {votingStep === "tally" && "Tally Votes"}
                            </div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        <div style={{ padding: "20px" }}>
                            {votingStep === "candidates" && (
                                <>
                                    <input
                                        type="text"
                                        className="search-input"
                                        placeholder="Search meals..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        style={{ marginBottom: "12px" }}
                                    />
                                    <div style={{ fontSize: "13px", color: "var(--text-light)", marginBottom: "12px" }}>
                                        Selected: {selectedCandidates.length}/8
                                    </div>
                                    {filteredMeals.map(meal => (
                                        <div
                                            key={meal.id}
                                            className={`vote-candidate ${selectedCandidates.includes(meal.id) ? "selected" : ""}`}
                                            onClick={() => handleSelectCandidate(meal.id)}
                                        >
                                            <input type="checkbox" checked={selectedCandidates.includes(meal.id)} readOnly style={{ marginRight: "8px" }} />
                                            <span>{meal.name}</span>
                                        </div>
                                    ))}
                                    <div style={{ display: "flex", gap: "12px", marginTop: "20px" }}>
                                        <button className="btn btn-primary" style={{ flex: 1 }} disabled={selectedCandidates.length < 4} onClick={handleGoToSend}>
                                            Next
                                        </button>
                                        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={onClose}>Cancel</button>
                                    </div>
                                </>
                            )}

                            {votingStep === "send" && (
                                <>
                                    <div style={{ fontSize: "13px", marginBottom: "16px", padding: "12px", background: "var(--cream)", borderRadius: "8px", fontFamily: "monospace", whiteSpace: "pre-wrap" }}>
                                        {'🍽️ Schwartz Family Meal Vote!\nReply with your top 3 numbers:\n' + voteCandidates.map((m, i) => `${i + 1}. ${m.name}`).join('\n') + '\n\nVote now! 🗳️'}
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => {
                                                const text = `🍽️ Schwartz Family Meal Vote!\nReply with your top 3 numbers:\n${voteCandidates.map((m, i) => `${i + 1}. ${m.name}`).join('\n')}\n\nVote now! 🗳️`;
                                                if (navigator.share) {
                                                    navigator.share({ text });
                                                } else {
                                                    navigator.clipboard.writeText(text);
                                                    alert("Copied to clipboard!");
                                                }
                                            }}
                                        >
                                            Share
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => {
                                                const text = `🍽️ Schwartz Family Meal Vote!\nReply with your top 3 numbers:\n${voteCandidates.map((m, i) => `${i + 1}. ${m.name}`).join('\n')}\n\nVote now! 🗳️`;
                                                navigator.clipboard.writeText(text);
                                                alert("Copied to clipboard!");
                                            }}
                                        >
                                            Copy
                                        </button>
                                        <button className="btn btn-secondary" onClick={handleGoToTally}>Next: Tally Votes</button>
                                    </div>
                                </>
                            )}

                            {votingStep === "tally" && (
                                <>
                                    {familyMembers.map(member => (
                                        <div key={member.id} style={{ marginBottom: "20px" }}>
                                            <div style={{ fontSize: "13px", fontWeight: "700", marginBottom: "8px" }}>{member.name}</div>
                                            {voteCandidates.map(meal => (
                                                <div
                                                    key={meal.id}
                                                    className="vote-tally-item"
                                                    onClick={() => handleVoteMeal(member.id, meal.id)}
                                                    style={{ cursor: "pointer", opacity: (familyVotes[member.id] || []).includes(meal.id) ? 1 : 0.6 }}
                                                >
                                                    <input type="checkbox" checked={(familyVotes[member.id] || []).includes(meal.id)} readOnly />
                                                    <span style={{ flex: 1 }}>{meal.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ))}

                                    {tally.length > 0 && (
                                        <div style={{ marginTop: "20px", padding: "16px", background: "var(--cream)", borderRadius: "8px" }}>
                                            <div style={{ fontSize: "13px", fontWeight: "700", marginBottom: "12px" }}>Results</div>
                                            {tally.map((item, idx) => (
                                                <div key={idx} style={{ marginBottom: "12px" }}>
                                                    <div style={{ fontSize: "12px", marginBottom: "4px" }}>
                                                        {idx + 1}. {item.meal.name} ({item.points} pts)
                                                    </div>
                                                    <div className="vote-tally-bar" style={{ width: `${(item.points / maxVotes) * 100}%` }} />
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div style={{ display: "flex", gap: "12px", marginTop: "20px" }}>
                                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={handlePlanWinners}>
                                            Plan Winners
                                        </button>
                                        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={onClose}>Done</button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AddMealModal({ onClose, onSave, initialName }) {
            const [formData, setFormData] = useState({
                name: initialName || "",
                cuisine: "American",
                prepTime: 30,
                prepType: "fresh",
                ingredients: "",
                notes: ""
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: name === "prepTime" ? parseInt(value) : value
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (formData.name.trim()) {
                    onSave({
                        ...formData,
                        ingredients: formData.ingredients.split(",").map(i => i.trim()).filter(Boolean)
                    });
                }
            };

            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content">
                        <div className="modal-header">
                            <div>Add New Meal</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        <form onSubmit={handleSubmit} style={{ padding: "0 20px 20px" }}>
                            <div className="form-group">
                                <label>Meal Name</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="e.g., Grilled Salmon" required />
                            </div>

                            <div className="form-group">
                                <label>Cuisine</label>
                                <select name="cuisine" value={formData.cuisine} onChange={handleChange}>
                                    {["American", "Mexican", "Asian", "Mediterranean", "Indian"].map(c => (
                                        <option key={c} value={c}>{c}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label>Prep Time (minutes)</label>
                                <input type="number" name="prepTime" value={formData.prepTime} onChange={handleChange} min="5" max="180" />
                            </div>

                            <div className="form-group">
                                <label>Meal Type</label>
                                <select name="prepType" value={formData.prepType} onChange={handleChange}>
                                    <option value="fresh">🔥 Fresh (quick-cook)</option>
                                    <option value="prep">🥘 Prep (slow-cooked/advance)</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label>Ingredients (comma-separated with quantities)</label>
                                <textarea name="ingredients" value={formData.ingredients} onChange={handleChange} placeholder="e.g., 2 lbs salmon fillet, 1 lemon, 3 cloves garlic" />
                            </div>

                            <div className="form-group">
                                <label>Notes</label>
                                <textarea name="notes" value={formData.notes} onChange={handleChange} placeholder="e.g., Serve with roasted vegetables" />
                            </div>

                            <button type="submit" className="btn btn-primary" style={{ width: "100%" }}>Add Meal</button>
                        </form>
                    </div>
                </div>
            );
        }

        function MealPickerModal({ meals, onSelectMeal, onClose, slot, isFavorite }) {
            const favorites = meals.filter(m => isFavorite(m.id));
            const others = meals.filter(m => !isFavorite(m.id));

            return (
                <div className="modal active" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal-content">
                        <div className="modal-header">
                            <div>Choose a Meal</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        <div style={{ padding: "0 20px 20px" }}>
                            {favorites.length > 0 && (
                                <>
                                    <h4 style={{ fontSize: "14px", fontWeight: "700", margin: "16px 0 12px" }}>Favorites</h4>
                                    {favorites.map(meal => (
                                        <div key={meal.id} className="meal-card" onClick={() => onSelectMeal(meal.id)} style={{ cursor: "pointer" }}>
                                            <div className="meal-card-icon">{MEAL_ICONS[meal.cuisine]}</div>
                                            <div className="meal-card-info">
                                                <div className="meal-card-name">{meal.name}</div>
                                                <div className="meal-card-meta">
                                                    <span className="cuisine-badge">{meal.cuisine}</span>
                                                    <span>{meal.prepTime}m</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </>
                            )}

                            {others.length > 0 && (
                                <>
                                    <h4 style={{ fontSize: "14px", fontWeight: "700", margin: "16px 0 12px" }}>All Meals</h4>
                                    {others.map(meal => (
                                        <div key={meal.id} className="meal-card" onClick={() => onSelectMeal(meal.id)} style={{ cursor: "pointer" }}>
                                            <div className="meal-card-icon">{MEAL_ICONS[meal.cuisine]}</div>
                                            <div className="meal-card-info">
                                                <div className="meal-card-name">{meal.name}</div>
                                                <div className="meal-card-meta">
                                                    <span className="cuisine-badge">{meal.cuisine}</span>
                                                    <span>{meal.prepTime}m</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
